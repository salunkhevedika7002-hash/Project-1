<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(255, 255, 255, 0.12);
      --panel-border: rgba(255, 255, 255, 0.22);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-strong: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.28), transparent 28rem),
        radial-gradient(circle at 82% 78%, rgba(245, 158, 11, 0.22), transparent 30rem),
        linear-gradient(135deg, #0f172a 0%, #111827 48%, #18181b 100%);
    }

    main {
      width: min(92vw, 760px);
      padding: clamp(2rem, 7vw, 5rem);
      position: relative;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(22px);
      text-align: center;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      pointer-events: none;
      z-index: -1;
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-bottom: 2.2rem;
    }

    nav a {
      min-width: 6.5rem;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    nav a:hover,
    nav a.active {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.7);
      background: rgba(56, 189, 248, 0.16);
    }

    .sparkle {
      display: inline-grid;
      width: 3rem;
      height: 3rem;
      margin-bottom: 1.4rem;
      place-items: center;
      border-radius: 999px;
      color: #111827;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 0 34px rgba(56, 189, 248, 0.45);
      font-size: 1.5rem;
      font-weight: 900;
    }

    .eyebrow {
      margin: 0 0 1.1rem;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.2rem, 11vw, 7.5rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .highlight {
      color: transparent;
      background: linear-gradient(90deg, #f8fafc, #38bdf8 48%, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      max-width: 34rem;
      margin: 1.5rem auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.7;
    }

    .contact-list {
      display: grid;
      gap: 0.9rem;
      max-width: 28rem;
      margin: 1.8rem auto 0;
      padding: 0;
      list-style: none;
    }

    .contact-list a {
      display: block;
      padding: 1rem 1.1rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
    }

  </style>
</head>
<body>
  <main>
    <nav aria-label="Main navigation">
      <a href="hello-world.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="sparkle" aria-hidden="true">*</div>
    <p class="eyebrow">Let us talk</p>
    <h1>Contact <span class="highlight">Me</span></h1>
    <p>Have a question, idea, or just want to say hello? Use the links below to get in touch.</p>
    <ul class="contact-list">
      <li><a href="mailto:hello@example.com">hello@example.com</a></li>
      <li><a href="tel:+10000000000">+1 000 000 0000</a></li>
      <li><a href="hello-world.html">Back to the homepage</a></li>
    </ul>
  </main>
</body>
</html>
