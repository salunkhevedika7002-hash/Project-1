<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(255, 255, 255, 0.12);
      --panel-border: rgba(255, 255, 255, 0.22);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-strong: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.28), transparent 28rem),
        radial-gradient(circle at 82% 78%, rgba(245, 158, 11, 0.22), transparent 30rem),
        linear-gradient(135deg, #0f172a 0%, #111827 48%, #18181b 100%);
    }

    main {
      width: min(92vw, 760px);
      padding: clamp(2rem, 7vw, 5rem);
      position: relative;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(22px);
      text-align: center;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      pointer-events: none;
      z-index: -1;
    }

    .eyebrow {
      margin: 0 0 1.1rem;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.5rem, 13vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .highlight {
      color: transparent;
      background: linear-gradient(90deg, #f8fafc, #38bdf8 48%, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      max-width: 34rem;
      margin: 1.5rem auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.7;
    }

    .sparkle {
      display: inline-grid;
      width: 3rem;
      height: 3rem;
      margin-bottom: 1.4rem;
      place-items: center;
      border-radius: 999px;
      color: #111827;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 0 34px rgba(56, 189, 248, 0.45);
      font-size: 1.5rem;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <div class="sparkle" aria-hidden="true">*</div>
    <p class="eyebrow">A tiny page with style</p>
    <h1>Hello <span class="highlight">World</span></h1>
    <p>Welcome to your shiny new HTML file. It is simple, responsive, and ready to open in any browser.</p>
  </main>
</body>
</html>
